[build]
  publish = "dist/spa"
  command = "npm run build"

# Proxy API requests to your hosted backend.
# Update the target URL when you deploy the Docker image (Railway, Render, Fly.io, etc.).
[[redirects]]
  from = "/api/*"
  to = "https://budgeteer-production-c541.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback for client-side routes (e.g. /overview)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
